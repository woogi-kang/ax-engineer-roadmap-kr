name: Roadmap gap
description: 빠진 역량, 단계, 판단 기준을 제안합니다. / Propose a missing competency, stage, or decision criterion.
title: "[Roadmap] "
labels:
  - roadmap
body:
  - type: textarea
    id: gap
    attributes:
      label: 어떤 내용이 빠져 있나요? / What is missing?
      description: 현재 독자가 무엇을 판단하거나 수행하기 어려운지 적어 주세요. / What is currently difficult for readers to decide or do?
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: 어느 위치에 필요한가요? / Where is it needed?
      description: 관련 파일이나 로드맵 영역을 적어 주세요. / Name the relevant file or roadmap area.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 근거 / Evidence
      description: 공식 자료, 공개 저장소, 연구, 재현 가능한 현장 증거를 연결해 주세요. / Link official material, public repositories, research, or reproducible practitioner evidence.
    validations:
      required: true
  - type: textarea
    id: limits
    attributes:
      label: 적용 범위와 반례 / Scope and counterexamples
      description: 특정 산업·회사·기술에만 해당하는지 적어 주세요. / Explain whether this applies only to a specific industry, company, or technology.
    validations:
      required: true
